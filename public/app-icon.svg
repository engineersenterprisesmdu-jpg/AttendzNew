<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#gradient)" />
  <!-- Gloss highlight -->
  <rect width="512" height="512" rx="112" fill="url(#glow)" />
  <!-- Inner circular ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="12" />
  <!-- Checkmark + Card graphic representing AttendX (Check-in/Scheduler) -->
  <g transform="translate(136, 126)">
    <!-- Main attendance badge graphic -->
    <path d="M40 200 L110 270 L220 100" fill="none" stroke="#ffffff" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Clock ring graphic -->
    <circle cx="110" cy="180" r="140" fill="none" stroke="#a5b4fc" stroke-width="14" stroke-opacity="0.6" stroke-dasharray="14 10" />
  </g>
</svg>
