<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AttendX Attendance & HRM System</title>
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    
    <!-- iOS / Safari Mobile App Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AttendX" />
    <link rel="apple-touch-icon" href="/app-icon.svg" />
  </head>
  <body class="overflow-x-hidden antialiased">
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
    
    <!-- Register Service Worker for PWA / Mobile Installation -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[AttendX PWA] Service Worker registered:', reg.scope))
            .catch(err => console.error('[AttendX PWA] Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
