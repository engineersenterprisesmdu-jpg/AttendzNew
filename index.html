<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AttendX Attendance & HRM System</title>
    <!-- Web App Manifest -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    
    <!-- iOS / Safari Mobile App Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AttendX" />
    <link rel="apple-touch-icon" href="./app-icon.svg" />

    <!-- Anti-Cache Poisoning & Fresh PWA Recovery Upgrade -->
    <script>
      (function() {
        var PWA_VERSION = 'attendx_v5_fresh';
        if (localStorage.getItem('pwa_version') !== PWA_VERSION) {
          console.warn('[AttendX PWA] Upgrading/Resetting PWA caches...');
          // Force unregister all service workers
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              for (var i = 0; i < registrations.length; i++) {
                registrations[i].unregister();
              }
            });
          }
          // Clear all cached storage
          if ('caches' in window) {
            caches.keys().then(function(keys) {
              Promise.all(keys.map(function(key) {
                return caches.delete(key);
              })).then(function() {
                localStorage.setItem('pwa_version', PWA_VERSION);
                console.warn('[AttendX PWA] Base caches cleared. Performing clean reload...');
                window.location.reload();
              }).catch(function() {
                localStorage.setItem('pwa_version', PWA_VERSION);
              });
            });
          } else {
            localStorage.setItem('pwa_version', PWA_VERSION);
          }
        }
      })();
    </script>

    <!-- Anti-404 Cache Recovery for Outdated PWA Build Chunks -->
    <script>
      window.addEventListener('error', function(e) {
        var target = e.target;
        if (target && (target.tagName === 'SCRIPT' || target.tagName === 'LINK')) {
          var src = target.src || target.href;
          console.warn('[AttendX PWA] Failed to load asset: ' + src + '. Attempting cache-busting reload...');
          
          var lastReload = sessionStorage.getItem('pwa_auto_reload');
          var now = Date.now();
          if (!lastReload || (now - parseInt(lastReload, 10)) > 10000) {
            sessionStorage.setItem('pwa_auto_reload', now);
            window.location.reload();
          }
        }
      }, true);
    </script>
  </head>
  <body class="overflow-x-hidden antialiased">
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
    
    <!-- Register Service Worker for PWA / Mobile Installation -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('[AttendX PWA] Service Worker registered:', reg.scope))
            .catch(err => console.error('[AttendX PWA] Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
